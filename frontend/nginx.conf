# Resolver DNS dla Dockera
resolver 127.0.0.11 valid=30s;

server {
    listen 80;
    server_name localhost;

    # Główny katalog aplikacji frontend
    root /usr/share/nginx/html;
    index index.html;

    # Proxy dla API backendu
    location /api {
        set $backend_upstream backend:3000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouty dla długich requestów (np. AI)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Obsługa React Router - wszystkie żądania przekierowane do index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache dla statycznych zasobów
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
